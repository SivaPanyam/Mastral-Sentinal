name: Mastra Sentinel CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: mastra_user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mastra_sentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
          
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Security Scan (Bandit)
      working-directory: ./backend
      run: |
        bandit -r app/ -c bandit.yaml || true
        
    - name: Run Tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://mastra_user:password@localhost:5432/mastra_sentinel_test
        REDIS_HOST: localhost
        SECRET_KEY: test_secret_key_ci
        OLLAMA_BASE_URL: http://localhost:11434
      run: |
        pytest tests/ -v
        
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Backend Image
      run: |
        docker build -t mastra-sentinel-backend:latest ./backend
        
    - name: Build Frontend Image
      run: |
        docker build -t mastra-sentinel-frontend:latest .
