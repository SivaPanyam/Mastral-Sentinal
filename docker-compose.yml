version: '3.8'

services:
  # ---------------------------------------------
  # React Web Frontend (Port 3000)
  # ---------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  # ---------------------------------------------
  # Redis Cache & Message Queue (Port 6379)
  # ---------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ---------------------------------------------
  # FastAPI SRE Agent Core Backend (Port 8000)
  # ---------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - ENKRYPTAI_API_KEY=${ENKRYPTAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_SERVER=${POSTGRES_SERVER:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-mastra_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mastra_sentinel}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - SECRET_KEY=supersecret_production_ready_hash_token_key
    depends_on:
      - postgres
      - qdrant
      - redis

  # ---------------------------------------------
  # ARQ Background Worker
  # ---------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel_worker
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_SERVER=${POSTGRES_SERVER:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-mastra_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mastra_sentinel}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
      - qdrant
    command: ["arq", "app.worker.WorkerSettings"]

  # ---------------------------------------------
  # Mastra AI Agent Engine (Port 3001)
  # ---------------------------------------------
  mastra_engine:
    build:
      context: ./backend/mastra-engine
      dockerfile: Dockerfile
    container_name: mastra_engine
    ports:
      - "3001:3001"
    environment:
      - FASTAPI_URL=http://backend:8000/api/v1
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - MASTRA_PORT=3001
    depends_on:
      - backend

  # ---------------------------------------------
  # Durable PostgreSQL database (Port 5432)
  # ---------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: sentinel_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-mastra_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mastra_sentinel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ---------------------------------------------
  # Qdrant Vector Engine (Port 6333)
  # ---------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sentinel_vector
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ---------------------------------------------
  # Prometheus Metrics Scraper (Port 9090)
  # ---------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel_prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - mastra_engine

  # ---------------------------------------------
  # Grafana Dashboards (Port 3002)
  # ---------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: sentinel_grafana
    restart: always
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin_password}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger

  # ---------------------------------------------
  # Jaeger Tracing (Port 16686 UI, 4318 OTLP HTTP)
  # ---------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: sentinel_jaeger
    restart: always
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

volumes:
  postgres_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  redis_data:
