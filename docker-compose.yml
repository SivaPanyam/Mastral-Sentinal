version: '3.8'

services:
  # ---------------------------------------------
  # React Web Frontend (Port 3000)
  # ---------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  # ---------------------------------------------
  # FastAPI SRE Agent Core Backend (Port 8000)
  # ---------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENKRYPTAI_API_KEY=${ENKRYPTAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_SERVER=${POSTGRES_SERVER:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-mastra_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mastra_sentinel}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - QDRANT_PORT=6333
      - SECRET_KEY=supersecret_production_ready_hash_token_key
    depends_on:
      - postgres
      - qdrant
      - mastra_engine

  # ---------------------------------------------
  # Mastra AI Agent Engine (Port 3001)
  # ---------------------------------------------
  mastra_engine:
    build:
      context: ./backend/mastra-engine
      dockerfile: Dockerfile
    container_name: mastra_engine
    ports:
      - "3001:3001"
    environment:
      - FASTAPI_URL=http://backend:8000/api/v1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MASTRA_PORT=3001
    depends_on:
      - backend

  # ---------------------------------------------
  # Durable PostgreSQL database (Port 5432)
  # ---------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: sentinel_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-mastra_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mastra_sentinel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ---------------------------------------------
  # Qdrant Vector Engine (Port 6333)
  # ---------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sentinel_vector
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
